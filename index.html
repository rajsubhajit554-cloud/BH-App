<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Hisab</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --font-sans: 'Outfit', system-ui, sans-serif;
  --color-background-base: #f1f5f9;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-background-tertiary: #f1f5f9;
  --color-background-info: #eff6ff;
  --color-background-danger: #fef2f2;
  --color-background-success: #f0fdf4;
  
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --color-text-info: #3b82f6;
  --color-text-danger: #ef4444;
  --color-text-success: #10b981;
  
  --color-border-primary: #e2e8f0;
  --color-border-secondary: #cbd5e1;
  --color-border-success: #a7f3d0;
  --color-border-danger: #fecaca;
  
  --border-radius-sm: 8px;
  --border-radius-md: 12px;
  --border-radius-lg: 16px;
  
  --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.02);
  --shadow-floating: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
  
  --accent-gradient: linear-gradient(135deg, #4f46e5, #3b82f6);
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-sans);
  background: var(--color-background-base);
  color:var(--color-text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Animations */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.app{padding:2rem 1.5rem; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.5s ease-out;}

.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px; background: #fff; padding: 1.5rem 2rem; border-radius: var(--border-radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border-primary);}
.header h1{font-size:24px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.5px; display: flex; align-items: center;}
.header p{font-size:14px;color:var(--color-text-secondary);margin-top:4px}

.summary-grid{display:flex;align-items:stretch;justify-content:space-between;gap:8px;margin-bottom:2rem;}
.metric{background:var(--color-background-primary);border:1px solid var(--color-border-primary);border-radius:var(--border-radius-sm);padding:12px 8px;box-shadow:var(--shadow-sm);transition:all 0.3s ease; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; overflow:hidden;}
.metric::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background: var(--accent-gradient); opacity:0; transition: opacity 0.3s; }
.metric:hover{transform:translateY(-2px);box-shadow:var(--shadow-md); border-color:var(--color-border-secondary);}
.metric:hover::before { opacity: 1; }
.metric-label{font-size:10px;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px;font-weight:700;display:flex;align-items:center;gap:4px; line-height:1.2;}
.metric-value{font-size:16px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.5px;}
.metric-value.paid{color:var(--color-text-success);}
.metric-value.due{color:var(--color-text-danger);}

.section-card{background:var(--color-background-primary);border:1px solid var(--color-border-primary);border-radius:var(--border-radius-lg);padding:2rem;margin-bottom:2rem;box-shadow:var(--shadow-md); animation: slideIn 0.4s ease-out forwards;}
.section-title{font-size:18px;font-weight:600;color:var(--color-text-primary);margin-bottom:1.5rem;display:flex;align-items:center;gap:10px; border-bottom: 2px solid var(--color-background-base); padding-bottom: 1rem;}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:24px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group label{font-size:13px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px;}
.form-group input{padding:14px 16px;font-size:15px;font-family:inherit;border:2px solid var(--color-border-primary);border-radius:var(--border-radius-md);background:var(--color-background-base);color:var(--color-text-primary);width:100%;transition:all 0.2s; font-weight: 500;}
.form-group input:focus{outline:none;border-color:#818cf8;background:#fff;box-shadow:0 0 0 4px rgba(99, 102, 241, 0.1)}

.btn-add{background:var(--accent-gradient);border:none;border-radius:var(--border-radius-md);padding:14px 28px;font-size:15px;font-family:inherit;cursor:pointer;color:#fff;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s;box-shadow:0 4px 12px rgba(79, 70, 229, 0.25);}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(79, 70, 229, 0.35);}
.btn-add:active{transform:translateY(0);}

.filter-row{display:flex;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap; background: var(--color-background-base); padding: 8px; border-radius: var(--border-radius-md);}
.filter-row input{flex:1;min-width:200px;padding:12px 16px;font-size:14px;font-family:inherit;border:1px solid transparent;border-radius:var(--border-radius-sm);background:#fff;color:var(--color-text-primary);box-shadow:var(--shadow-sm);transition:all 0.2s;}
.filter-row input:focus{outline:none;border-color:#818cf8;box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
.filter-btn{padding:10px 20px;border:none;border-radius:var(--border-radius-sm);background:transparent;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--color-text-secondary);transition:all 0.2s;}
.filter-btn:hover{color:var(--color-text-primary);background:rgba(0,0,0,0.05);}
.filter-btn.active{background:#fff;color:var(--color-text-primary);box-shadow:var(--shadow-sm);}

.customer-card{border:1px solid var(--color-border-primary);border-radius:var(--border-radius-md);padding:1.5rem;margin-bottom:16px;background:#fff;transition:all 0.3s ease;box-shadow:var(--shadow-sm); animation: slideIn 0.3s ease-out forwards;}
.customer-card:hover{border-color:var(--color-border-secondary);box-shadow:var(--shadow-md); transform:translateX(4px);}
.customer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:16px}
.customer-name{display:flex;align-items:center;gap:16px}
.avatar{width:48px;height:48px;border-radius:14px;background:var(--color-background-info);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:var(--color-text-info);flex-shrink:0; border: 1px solid rgba(59, 130, 246, 0.1);}
.cname{font-size:18px;font-weight:700;color:var(--color-text-primary);letter-spacing:-0.3px;}
.badges{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-size:12px;padding:6px 12px;border-radius:var(--border-radius-sm);font-weight:700;letter-spacing:0.5px; display:inline-flex; align-items:center; gap:4px; text-transform:uppercase;}
.badge-due{background:var(--color-background-danger);color:var(--color-text-danger);border:1px solid var(--color-border-danger);}
.badge-paid{background:var(--color-background-success);color:var(--color-text-success);border:1px solid var(--color-border-success);}

.payments-table{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed;margin-top:8px;}
.payments-table th{text-align:left;padding:12px;color:var(--color-text-secondary);font-weight:600;border-bottom:2px solid var(--color-background-base); text-transform:uppercase; font-size:11px; letter-spacing:0.5px;}
.payments-table td{padding:14px 12px;color:var(--color-text-primary);border-bottom:1px solid var(--color-border-primary); font-weight:500;}
.payments-table tr:last-child td{border-bottom:none}

.btn-del{background:var(--color-background-danger);border:none;cursor:pointer;color:var(--color-text-danger);padding:8px;border-radius:var(--border-radius-sm);font-size:16px;transition:all 0.2s; display:inline-flex;}
.btn-del:hover{background:#fca5a5;color:#991b1b;transform:scale(1.05);}

.btn-del-cust{background:transparent;border:1px solid var(--color-border-danger);cursor:pointer;color:var(--color-text-danger);font-size:15px;padding:8px 12px;border-radius:var(--border-radius-sm);transition:all 0.2s; display:inline-flex; align-items:center;}
.btn-del-cust:hover{background:var(--color-background-danger);transform:translateY(-1px);}

.add-payment-row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;align-items:center;background:var(--color-background-base);padding:16px;border-radius:var(--border-radius-md);border:1px solid var(--color-border-primary);}
.add-payment-row input{flex:1;min-width:140px;padding:12px 16px;font-size:14px;font-family:inherit;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-sm);background:#fff;color:var(--color-text-primary); font-weight:500; transition:all 0.2s;}
.add-payment-row input:focus{outline:none;border-color:var(--color-text-info);box-shadow:0 0 0 3px rgba(59, 130, 246, 0.1);}

.btn-pay{background:#10b981;border:none;border-radius:var(--border-radius-sm);padding:12px 24px;font-size:14px;font-family:inherit;cursor:pointer;color:#fff;font-weight:700;transition:all 0.2s;box-shadow:0 2px 4px rgba(16, 185, 129, 0.2);}
.btn-pay:hover{background:#059669;transform:translateY(-1px);box-shadow:0 4px 6px rgba(16, 185, 129, 0.3);}

.btn-due{background:#ef4444;border:none;border-radius:var(--border-radius-sm);padding:12px 24px;font-size:14px;font-family:inherit;cursor:pointer;color:#fff;font-weight:700;transition:all 0.2s;box-shadow:0 2px 4px rgba(239, 68, 68, 0.2);}
.btn-due:hover{background:#dc2626;transform:translateY(-1px);box-shadow:0 4px 6px rgba(239, 68, 68, 0.3);}

.empty{text-align:center;padding:4rem 1rem;color:var(--color-text-secondary);font-size:16px;background:var(--color-background-base);border-radius:var(--border-radius-md);border:2px dashed var(--color-border-secondary);font-weight:500;}

.toggle-pay{background:var(--color-background-base);border:1px solid var(--color-border-primary);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;color:var(--color-text-secondary);padding:10px 20px;border-radius:var(--border-radius-sm);margin-top:16px;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
.toggle-pay:hover{background:var(--color-border-primary);color:var(--color-text-primary);}

.pay-section{margin-top:8px}

.btn-action{background:#fff;border:1px solid var(--color-border-primary);border-radius:var(--border-radius-sm);padding:10px 16px;font-size:13px;font-family:inherit;cursor:pointer;color:var(--color-text-secondary);font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all 0.2s;text-decoration:none;box-shadow:var(--shadow-sm)}
.btn-action:hover:not(:disabled){background:var(--color-background-base);color:var(--color-text-primary);border-color:var(--color-border-secondary);transform:translateY(-1px);}
.btn-action:disabled{opacity:0.5;cursor:not-allowed;box-shadow:none;}

@media (max-width: 600px) {
  .app { padding: 1rem 0.5rem; }
  .header { padding: 1rem 1.25rem; flex-direction: column; text-align: center; gap: 16px; margin-bottom: 1.5rem; }
  .header h1 { justify-content: center; font-size: 22px; }
  .header > div:last-child { justify-content: center; width: 100%; flex-wrap: wrap; gap: 6px; }
  .btn-action { padding: 8px 10px; font-size: 12px; flex: 1; justify-content: center; min-width: 45%; }
  .section-card { padding: 1.25rem 1rem; margin-bottom: 1.25rem; border-radius: var(--border-radius-md); }
  .section-title { font-size: 16px; margin-bottom: 1rem; }
  .summary-grid { gap: 4px; margin-bottom: 1.5rem; }
  .metric { padding: 8px 4px; border-radius: var(--border-radius-sm); }
  .metric-label { font-size: 9px; margin-bottom: 2px; }
  .metric-value { font-size: 14px; }
  .form-grid { grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
  .customer-card { padding: 1rem; margin-bottom: 12px; }
  .customer-header { gap: 12px; flex-direction: column; align-items: stretch; margin-bottom: 12px; }
  .customer-name { justify-content: flex-start; }
  .avatar { width: 40px; height: 40px; font-size: 16px; border-radius: 10px; }
  .cname { font-size: 16px; }
  .badges { justify-content: flex-start; }
  .customer-header > div:last-child { justify-content: space-between; width: 100%; align-items: center; }
  .btn-add, .btn-pay, .btn-due { width: 100%; justify-content: center; padding: 12px; }
  .filter-row { flex-direction: column; gap: 8px; padding: 12px; }
  .filter-row input { width: 100%; min-width: unset; }
  .filter-row button { width: 100%; }
  .add-payment-row { flex-direction: column; align-items: stretch; padding: 12px; }
  .add-payment-row input { width: 100%; min-width: unset; }
  .payments-table th, .payments-table td { padding: 8px 6px; font-size: 13px; }
  .btn-del-cust { padding: 6px 10px; }
}
</style>

<div class="app">
  <h2 class="sr-only" style="position:absolute;left:-9999px">ব্যবসার হিসাব - Customer Ledger App</h2>
  <div class="header">
    <div>
      <h1><i class="ti ti-report-money" aria-hidden="true" style="font-size:20px;vertical-align:-2px;margin-right:6px"></i>ব্যবসার হিসাব</h1>
      <p>Customer payment tracker</p>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="btn-action" id="btnUndo" onclick="undo()" title="Undo" disabled>
        <i class="ti ti-arrow-back-up" aria-hidden="true"></i> Undo
      </button>
      <button class="btn-action" id="btnRedo" onclick="redo()" title="Redo" disabled>
        <i class="ti ti-arrow-forward-up" aria-hidden="true"></i> Redo
      </button>
      <button class="btn-action" onclick="exportData()" title="Backup Data">
        <i class="ti ti-device-floppy" aria-hidden="true"></i> Save
      </button>
      <button class="btn-action" onclick="importDataFile()" title="Restore Data">
        <i class="ti ti-upload" aria-hidden="true"></i> Upload
      </button>
    </div>
  </div>

  <div class="summary-grid" id="summaryGrid"></div>

  <div class="section-card">
    <div class="section-title"><i class="ti ti-user-plus" aria-hidden="true" style="font-size:18px"></i>নতুন Customer যোগ করুন</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Customer নাম</label>
        <input type="text" id="newName" placeholder="যেমন: রহিম সাহেব" />
      </div>
      <div class="form-group">
        <label>মোট বাকি পাওনা (টাকা)</label>
        <input type="number" id="newDue" placeholder="যেমন: 5000" min="0" />
      </div>
    </div>
    <button class="btn-add" onclick="addCustomer()">
      <i class="ti ti-plus" aria-hidden="true"></i> যোগ করুন
    </button>
  </div>

  <div class="section-card" id="customerListCard">
    <div class="section-title" style="cursor:pointer; justify-content:space-between; margin-bottom:0; border-bottom:none; padding-bottom:0;" onclick="toggleCustomerList()">
      <div style="display:flex;align-items:center;gap:10px;">
        <i class="ti ti-users" aria-hidden="true" style="font-size:18px"></i>Customer তালিকা
      </div>
      <i id="customerListIcon" class="ti ti-chevron-down" style="font-size:20px; color:var(--color-text-secondary);"></i>
    </div>
    <div id="customerListContainer" style="display:none; margin-top:1.5rem; border-top:2px solid var(--color-background-base); padding-top:1.5rem;">
      <div class="filter-row">
        <input type="text" id="searchBox" placeholder="নাম খুঁজুন..." oninput="renderCustomers()" />
        <button class="filter-btn active" id="fAll" onclick="setFilter('all')">সবাই</button>
        <button class="filter-btn" id="fDue" onclick="setFilter('due')">বাকি আছে</button>
        <button class="filter-btn" id="fClear" onclick="setFilter('clear')">মিটে গেছে</button>
      </div>
      <div id="customerList"></div>
    </div>
  </div>
</div>

<script>
let isCustomerListVisible = false;
function toggleCustomerList() {
  isCustomerListVisible = !isCustomerListVisible;
  const container = document.getElementById('customerListContainer');
  const icon = document.getElementById('customerListIcon');
  const title = container.previousElementSibling;
  
  if (isCustomerListVisible) {
    container.style.display = 'block';
    icon.classList.remove('ti-chevron-down');
    icon.classList.add('ti-chevron-up');
    title.style.marginBottom = '1.5rem';
    title.style.borderBottom = '2px solid var(--color-background-base)';
    title.style.paddingBottom = '1rem';
    container.style.marginTop = '0';
    container.style.borderTop = 'none';
    container.style.paddingTop = '0';
  } else {
    container.style.display = 'none';
    icon.classList.remove('ti-chevron-up');
    icon.classList.add('ti-chevron-down');
    title.style.marginBottom = '0';
    title.style.borderBottom = 'none';
    title.style.paddingBottom = '0';
    container.style.marginTop = '1.5rem';
    container.style.borderTop = '2px solid var(--color-background-base)';
    container.style.paddingTop = '1.5rem';
  }
}

let customers = JSON.parse(localStorage.getItem('hisab_customers') || '[]');
let filter = 'all';
let expandedPayments = {};
let expandedDues = {};
let currentFileHandle = null;
let undoStack = [];
let redoStack = [];
const MAX_HISTORY = 50;

function recordState() {
  undoStack.push(JSON.stringify(customers));
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack = [];
  updateUndoRedoButtons();
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(JSON.stringify(customers));
  customers = JSON.parse(undoStack.pop());
  save();
  renderAll();
  updateUndoRedoButtons();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(JSON.stringify(customers));
  customers = JSON.parse(redoStack.pop());
  save();
  renderAll();
  updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
  const undoBtn = document.getElementById('btnUndo');
  const redoBtn = document.getElementById('btnRedo');
  if (undoBtn) undoBtn.disabled = undoStack.length === 0;
  if (redoBtn) redoBtn.disabled = redoStack.length === 0;
}

function save() {
  try { localStorage.setItem('hisab_customers', JSON.stringify(customers)); } catch(e){}
}

function initials(name) {
  return name.trim().split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2) || 'CU';
}

function fmt(n) {
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function fmtDate(d) {
  if(!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('bn-BD', {day:'2-digit',month:'short',year:'numeric'});
}

function setFilter(f) {
  filter = f;
  ['fAll','fDue','fClear'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(f==='all'?'fAll':f==='due'?'fDue':'fClear').classList.add('active');
  renderCustomers();
}

function addCustomer() {
  const name = document.getElementById('newName').value.trim();
  const due = parseFloat(document.getElementById('newDue').value) || 0;
  if(!name) { alert('Customer নাম দিন'); return; }
  recordState();
  const id = Date.now();
  const dues = due > 0 ? [{ id: id + 1, amount: due, date: new Date().toISOString().split('T')[0] }] : [];
  customers.push({ id, name, totalDue: due, dues, payments: [] });
  document.getElementById('newName').value='';
  document.getElementById('newDue').value='';
  save();
  renderAll();
}

function deleteCustomer(id) {
  if(!confirm('এই customer মুছে ফেলবেন?')) return;
  recordState();
  customers = customers.filter(c=>c.id!==id);
  save();
  renderAll();
}

function addPayment(id) {
  const c = customers.find(c=>c.id===id);
  const amtEl = document.getElementById('payAmt_'+id);
  const dateEl = document.getElementById('payDate_'+id);
  const amt = parseFloat(amtEl.value);
  if(!amt || amt<=0) { alert('পরিমাণ দিন'); return; }
  const totalPaid = c.payments.reduce((s,p)=>s+p.amount,0);
  if(amt > (c.totalDue - totalPaid)) { alert('বাকির চেয়ে বেশি দেওয়া যাবে না'); return; }
  recordState();
  c.payments.push({ id: Date.now(), amount: amt, date: dateEl.value || new Date().toISOString().split('T')[0] });
  amtEl.value='';
  dateEl.value='';
  expandedPayments[id] = true;
  save();
  renderAll();
}

function deletePayment(cid, pid) {
  recordState();
  const c = customers.find(c=>c.id===cid);
  c.payments = c.payments.filter(p=>p.id!==pid);
  save();
  renderAll();
}

function togglePayments(id) {
  expandedPayments[id] = !expandedPayments[id];
  renderCustomers();
}

function toggleDues(id) {
  expandedDues[id] = !expandedDues[id];
  renderCustomers();
}

function addDue(id) {
  const c = customers.find(c=>c.id===id);
  const amtEl = document.getElementById('dueAmt_'+id);
  const dateEl = document.getElementById('dueDate_'+id);
  const amt = parseFloat(amtEl.value);
  if(!amt || amt<=0) { alert('পরিমাণ দিন'); return; }
  recordState();
  if (!c.dues) c.dues = c.totalDue > 0 ? [{ id: c.id, amount: c.totalDue, date: new Date(c.id).toISOString().split('T')[0] }] : [];
  c.dues.push({ id: Date.now(), amount: amt, date: dateEl.value || new Date().toISOString().split('T')[0] });
  c.totalDue += amt;
  amtEl.value='';
  dateEl.value='';
  expandedDues[id] = true;
  save();
  renderAll();
}

function deleteDue(cid, did) {
  if(!confirm('এই বাকি মুছে ফেলবেন?')) return;
  recordState();
  const c = customers.find(c=>c.id===cid);
  const d = c.dues.find(d=>d.id===did);
  if (d) c.totalDue -= d.amount;
  c.dues = c.dues.filter(d=>d.id!==did);
  save();
  renderAll();
}

async function exportData() {
  const jsonStr = JSON.stringify(customers, null, 2);
  
  try {
    if (window.showSaveFilePicker) {
      if (!currentFileHandle) {
        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        const timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '-');
        const fileName = `hisab_backup_${dateStr}_${timeStr}.json`;
        
        currentFileHandle = await window.showSaveFilePicker({
          suggestedName: fileName,
          types: [{
            description: 'JSON Backup File',
            accept: {'application/json': ['.json']},
          }],
        });
      }
      const writable = await currentFileHandle.createWritable();
      await writable.write(jsonStr);
      await writable.close();
      alert('ফাইলটি সফলভাবে সেভ হয়েছে!');
    } else {
      const now = new Date();
      const dateStr = now.toISOString().split('T')[0];
      const timeStr = now.toTimeString().split(' ')[0].replace(/:/g, '-');
      const fileName = `hisab_backup_${dateStr}_${timeStr}.json`;
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(jsonStr);
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", fileName);
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error(err);
      alert('ফাইল সেভ করতে সমস্যা হয়েছে!');
    }
  }
}

async function importDataFile() {
  try {
    if (window.showOpenFilePicker) {
      const [handle] = await window.showOpenFilePicker({
        types: [{
          description: 'JSON Backup File',
          accept: {'application/json': ['.json']},
        }],
      });
      const file = await handle.getFile();
      const text = await file.text();
      processImportedText(text, handle);
    } else {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => processImportedText(ev.target.result, null);
        reader.readAsText(file);
      };
      input.click();
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.error(err);
      alert('ফাইল খুলতে সমস্যা হয়েছে!');
    }
  }
}

function processImportedText(text, handle) {
  try {
    const importedData = JSON.parse(text);
    if (Array.isArray(importedData)) {
      if (confirm('বর্তমান ডাটা মুছে গিয়ে ব্যাকআপ ডাটা রিস্টোর হবে। আপনি কি নিশ্চিত?')) {
        recordState();
        customers = importedData;
        save();
        renderAll();
        if (handle) currentFileHandle = handle;
        alert('ডাটা সফলভাবে রিস্টোর হয়েছে!');
      }
    } else {
      alert('ভুল ফাইল ফরম্যাট!');
    }
  } catch (err) {
    alert('ফাইল পড়তে সমস্যা হয়েছে!');
  }
}

function renderSummary() {
  const totalDue = customers.reduce((s,c)=>s+c.totalDue,0);
  const totalPaid = customers.reduce((s,c)=>s+c.payments.reduce((a,p)=>a+p.amount,0),0);
  const remaining = totalDue - totalPaid;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="metric"><div class="metric-label"><i class="ti ti-users" aria-hidden="true"></i> মোট Customer</div><div class="metric-value">${customers.length} জন</div></div>
    <div class="metric"><div class="metric-label"><i class="ti ti-currency-rupee" aria-hidden="true"></i> মোট পাওনা</div><div class="metric-value">${fmt(totalDue)}</div></div>
    <div class="metric"><div class="metric-label"><i class="ti ti-circle-check" aria-hidden="true"></i> মোট পেয়েছি</div><div class="metric-value paid">${fmt(totalPaid)}</div></div>
    <div class="metric"><div class="metric-label"><i class="ti ti-alert-circle" aria-hidden="true"></i> এখনও বাকি</div><div class="metric-value due">${fmt(remaining)}</div></div>
  `;
}

function renderCustomers() {
  const search = (document.getElementById('searchBox').value||'').toLowerCase();
  let list = customers.filter(c => c.name.toLowerCase().includes(search));
  if(filter==='due') list = list.filter(c => {
    const paid = c.payments.reduce((s,p)=>s+p.amount,0);
    return paid < c.totalDue;
  });
  if(filter==='clear') list = list.filter(c => {
    const paid = c.payments.reduce((s,p)=>s+p.amount,0);
    return paid >= c.totalDue;
  });

  if(list.length===0) {
    document.getElementById('customerList').innerHTML = `<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:8px"></i>কোনো customer নেই</div>`;
    return;
  }

  document.getElementById('customerList').innerHTML = list.map(c => {
    if (!c.dues) c.dues = c.totalDue > 0 ? [{ id: c.id, amount: c.totalDue, date: new Date(c.id).toISOString().split('T')[0] }] : [];
    const totalPaid = c.payments.reduce((s,p)=>s+p.amount,0);
    const remaining = c.totalDue - totalPaid;
    const isDone = remaining <= 0;
    const showPay = expandedPayments[c.id];
    const showDue = expandedDues[c.id];
    
    const payRows = c.payments.length ? c.payments.map(p=>`
      <tr>
        <td>${fmtDate(p.date)}</td>
        <td style="color:var(--color-text-success);font-weight:600">${fmt(p.amount)}</td>
        <td><button class="btn-del" onclick="deletePayment(${c.id},${p.id})" title="মুছুন"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
      </tr>`).join('') : '<tr><td colspan="3" style="color:var(--color-text-secondary);padding:8px">কোনো payment নেই</td></tr>';
      
    const dueRows = c.dues.length ? c.dues.map(d=>`
      <tr>
        <td>${fmtDate(d.date)}</td>
        <td style="color:var(--color-text-danger);font-weight:600">${fmt(d.amount)}</td>
        <td><button class="btn-del" onclick="deleteDue(${c.id},${d.id})" title="মুছুন"><i class="ti ti-trash" aria-hidden="true"></i></button></td>
      </tr>`).join('') : '<tr><td colspan="3" style="color:var(--color-text-secondary);padding:8px">কোনো বাকি নেই</td></tr>';

    return `
    <div class="customer-card">
      <div class="customer-header">
        <div class="customer-name">
          <div class="avatar">${initials(c.name)}</div>
          <div>
            <div class="cname">${c.name}</div>
            <div style="font-size:13px;color:var(--color-text-secondary);margin-top:4px">মোট বাকি: <strong style="color:var(--color-text-primary)">${fmt(c.totalDue)}</strong></div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="badges">
            <span class="badge badge-paid"><i class="ti ti-check" aria-hidden="true"></i> পেয়েছি: ${fmt(totalPaid)}</span>
            ${isDone ? '<span class="badge badge-paid">✓ মিটে গেছে</span>' : `<span class="badge badge-due">পাওনা: ${fmt(remaining)}</span>`}
          </div>
          <button class="btn-del-cust" onclick="deleteCustomer(${c.id})" title="মুছুন"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>
      </div>

      <div style="border-top:1px solid var(--color-border-primary);padding-top:16px;margin-top:16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px">
        <div>
          <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;font-weight:500"><i class="ti ti-plus" aria-hidden="true"></i> নতুন বাকি যোগ করুন</div>
          <div class="add-payment-row" style="margin-top:0">
            <input type="number" id="dueAmt_${c.id}" placeholder="টাকার পরিমাণ" min="1" />
            <input type="date" id="dueDate_${c.id}" value="${new Date().toISOString().split('T')[0]}" />
            <button class="btn-due" onclick="addDue(${c.id})">যোগ</button>
          </div>
        </div>
        ${!isDone ? `
        <div>
          <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;font-weight:500"><i class="ti ti-cash" aria-hidden="true"></i> নতুন payment নিন</div>
          <div class="add-payment-row" style="margin-top:0">
            <input type="number" id="payAmt_${c.id}" placeholder="টাকার পরিমাণ" min="1" max="${remaining}" />
            <input type="date" id="payDate_${c.id}" value="${new Date().toISOString().split('T')[0]}" />
            <button class="btn-pay" onclick="addPayment(${c.id})">যোগ</button>
          </div>
        </div>` : '<div></div>'}
      </div>

      <div class="pay-section" style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap">
        <button class="toggle-pay" onclick="toggleDues(${c.id})">
          <i class="ti ti-chevron-${showDue?'up':'down'}" aria-hidden="true"></i>
          ${showDue ? 'বাকি ইতিহাস লুকান' : `বাকি ইতিহাস (${c.dues.length}টি)`}
        </button>
        <button class="toggle-pay" onclick="togglePayments(${c.id})">
          <i class="ti ti-chevron-${showPay?'up':'down'}" aria-hidden="true"></i>
          ${showPay ? 'Payment ইতিহাস লুকান' : `Payment ইতিহাস (${c.payments.length}টি)`}
        </button>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px">
        ${showDue ? `
        <div style="margin-top:12px;background:var(--color-background-base);border-radius:var(--border-radius-md);padding:12px;border:1px solid var(--color-border-primary)">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--color-text-danger);text-transform:uppercase;letter-spacing:0.5px">বাকি ইতিহাস</div>
          <table class="payments-table">
            <thead><tr><th>তারিখ</th><th>টাকা</th><th></th></tr></thead>
            <tbody>${dueRows}</tbody>
          </table>
        </div>` : ''}
        ${showPay ? `
        <div style="margin-top:12px;background:var(--color-background-base);border-radius:var(--border-radius-md);padding:12px;border:1px solid var(--color-border-primary)">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--color-text-success);text-transform:uppercase;letter-spacing:0.5px">Payment ইতিহাস</div>
          <table class="payments-table">
            <thead><tr><th>তারিখ</th><th>টাকা</th><th></th></tr></thead>
            <tbody>${payRows}</tbody>
          </table>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  renderSummary();
  renderCustomers();
}

renderAll();
</script>
</body>
</html>
